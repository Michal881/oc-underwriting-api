<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OC Underwriting MVP</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>OC Underwriting Engine (MVP)</h1>
    <p class="muted">Prosty formularz do oceny ryzyka OC bez kalkulacji ceny.</p>

    <form id="underwriting-form">
      <section class="card" id="base-questions"></section>
      <section class="card" id="branch-questions"></section>
      <section class="card validation-errors" id="validation-errors" hidden></section>

      <div class="actions">
        <button type="submit">Oceń case</button>
      </div>
    </form>

    <section class="card" id="result" hidden>
      <h2>Wynik</h2>
      <div class="result-row"><strong>Branża:</strong> <span id="out-industry"></span></div>
      <div class="result-row"><strong>Model:</strong> <span id="out-model"></span></div>
      <div class="result-row"><strong>Ryzyka:</strong> <span id="out-risks"></span></div>
      <div class="result-row"><strong>Zakres:</strong> <span id="out-coverages"></span></div>
      <div class="result-row"><strong>Czy referral:</strong> <span id="out-referral"></span></div>
    </section>
  </main>

  <script src="reference-data.js"></script>
  <script src="industry-question-engine.js"></script>
  <script src="app.js"></script>
</body>
</html>
